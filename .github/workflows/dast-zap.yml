name: DAST - OWASP ZAP

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  dast-zap:
    name: DAST - OWASP ZAP (VAmPI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start VAmPI
        run: |
          docker compose up -d
          echo "Aguardando VAmPI iniciar..."
          sleep 20

      - name: Verify VAmPI is running
        run: |
          curl -s -o /dev/null -w "%{http_code}" http://localhost:5000 | grep -qE "200|404" && \
          echo "✅ VAmPI está rodando" || \
          echo "⚠️ VAmPI pode não estar pronto"

      - name: ZAP API Scan
        uses: zaproxy/action-api-scan@v0.7.0
        with:
          target: 'http://localhost:5000/openapi.json'
          allow_issue_writing: false
          fail_action: false
        continue-on-error: true

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report-vampi
          path: report_html.html
          retention-days: 30

      - name: Stop VAmPI
        if: always()
        run: docker compose down
