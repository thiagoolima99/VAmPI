# =============================================================================
# Security Pipeline — VAmPI (Python/Flask API)
# =============================================================================
# This workflow calls the centralized reusable security workflow.
# Repository: YOUR_GITHUB_USERNAME/devsecops-central
#
# Replace YOUR_GITHUB_USERNAME with your actual GitHub username in the `uses` field.
# =============================================================================

name: Security CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    # Full security scan every Monday at 07:00 UTC
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      fail-on-high:
        description: "Fail pipeline on HIGH/CRITICAL findings"
        type: boolean
        default: true

jobs:
  security:
    name: Python/Flask Security
    uses: thiagoolima99/secCentralLayer/.github/workflows/reusable-python-security.yml@main
    with:
      python-version: "3.11"
      fail-on-high: ${{ github.event_name != 'schedule' && (github.event.inputs.fail-on-high != 'false') }}
      # VAmPI is a vulnerable API — extra Flask + API-specific rules
      semgrep-rules: "p/python p/flask p/owasp-top-ten p/secrets p/bandit p/sql-injection"
      requirements-file: "requirements.txt"
      working-directory: "."
    secrets: inherit
    permissions:
      contents: read
      security-events: write  # Required for SARIF upload to GitHub Security tab
      pull-requests: write    # Required for PR comments
